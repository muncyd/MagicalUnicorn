<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Acadia's Unicorn Sky Ride!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0a0a2e;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; font-family:'Nunito',sans-serif; overflow:hidden;
    touch-action:none;
  }
  #gameTitle {
    font-family:'Fredoka One',cursive; color:#FFE44D; font-size:1.8rem;
    text-shadow:3px 3px 0 #B8860B, 0 0 20px rgba(255,228,77,0.5);
    margin-bottom:6px; letter-spacing:1px;
    animation:titleBounce 2s ease-in-out infinite;
  }
  @keyframes titleBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  #gameWrap {
    position:relative; border:3px solid #a78bfa;
    border-radius:12px; overflow:hidden;
    box-shadow:0 0 40px rgba(167,139,250,0.4), 0 0 80px rgba(167,139,250,0.15);
  }
  canvas { display:block; }
  #overlay {
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:rgba(5,5,30,0.82); z-index:10; backdrop-filter:blur(4px);
  }
  #overlay h2 {
    font-family:'Fredoka One',cursive; color:#FFE44D; font-size:2.4rem;
    text-shadow:3px 3px 0 #B8860B; margin-bottom:8px; text-align:center;
  }
  #overlay .sub { color:#c4b5fd; font-size:1rem; margin-bottom:6px; text-align:center; }
  #overlay .final { font-family:'Fredoka One',cursive; font-size:2.6rem; color:#4ade80; margin:8px 0; }
  #overlay .lives-row { display:flex; gap:8px; margin:10px 0; font-size:1.5rem; }
  #startBtn {
    margin-top:14px; padding:12px 36px;
    background:linear-gradient(135deg,#a78bfa,#7c3aed); color:white;
    border:none; border-radius:50px; font-family:'Fredoka One',cursive;
    font-size:1.3rem; cursor:pointer;
    box-shadow:0 6px 20px rgba(124,58,237,0.5);
    transition:transform .15s, box-shadow .15s;
  }
  #startBtn:hover { transform:scale(1.07) translateY(-2px); box-shadow:0 10px 28px rgba(124,58,237,0.7); }
  #startBtn:active { transform:scale(0.97); }
  #controls-hint { color:rgba(196,181,253,0.7); font-size:0.8rem; margin-top:8px; text-align:center; }
</style>
</head>
<body>
<div id="gameTitle">&#x1F984; Acadia's Unicorn Sky Ride! &#x1F984;</div>
<div id="gameWrap">
  <canvas id="c" width="700" height="400"></canvas>
  <div id="overlay">
    <h2 id="ovTitle">&#x1F984; Sky Ride! &#x2B50;</h2>
    <div class="sub" id="ovSub">Dodge monsters, fireballs &amp; evil beasts!</div>
    <div class="sub" id="ovSub2">You have 3 lives &#x2764;&#xFE0F;&#x2764;&#xFE0F;&#x2764;&#xFE0F;</div>
    <div class="final" id="ovScore" style="display:none"></div>
    <button id="startBtn">RIDE! &#x1F984;</button>
    <div id="controls-hint">Arrow Keys to move &nbsp;|&nbsp; WASD &nbsp;|&nbsp; Swipe on mobile</div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ── Game state ─────────────────────────────────────────────────────────────
let gameActive = false;
let score = 0, bestScore = 0, lives = 3;
let frame = 0;
let speed = 3.5;
let playerY = H / 2;
let playerX = 130;
let playerVY = 0;
let playerVX = 0;
let invincible = 0;      // frames of invincibility after hit
let hitAnim = 0;         // flash animation after hit
let deathAnim = 0;       // death spin animation
let dying = false;
let particles = [];
let obstacles = [];
let clouds = [];
let stars = [];
let bgClouds = [];
let scrollX = 0;

// ── Input ──────────────────────────────────────────────────────────────────
const keys = {};
let touchStartY = null;
let touchDir = 0; // -1 up, 1 down, 0 none

window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','s','a','d',' '].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

canvas.addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY;
  touchDir = 0;
}, {passive:false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const dy = e.touches[0].clientY - touchStartY;
  touchDir = dy < -10 ? -1 : dy > 10 ? 1 : 0;
}, {passive:false});
canvas.addEventListener('touchend', () => { touchDir = 0; touchStartY = null; });

function isUp()    { return keys['ArrowUp']    || keys['w'] || keys['W'] || touchDir === -1; }
function isDown()  { return keys['ArrowDown']  || keys['s'] || keys['S'] || touchDir ===  1; }
function isLeft()  { return keys['ArrowLeft']  || keys['a'] || keys['A']; }
function isRight() { return keys['ArrowRight'] || keys['d'] || keys['D']; }

// ── Obstacle types ─────────────────────────────────────────────────────────
const OBS_TYPES = [
  { id:'dragon',   w:70, h:55, color:'#e53e3e', pts:10 },
  { id:'ghost',    w:50, h:60, color:'#a78bfa', pts:8  },
  { id:'fireball', w:36, h:36, color:'#f97316', pts:5  },
  { id:'bat',      w:55, h:35, color:'#1e293b', pts:6  },
  { id:'skull',    w:40, h:45, color:'#94a3b8', pts:7  },
  { id:'bomb',     w:38, h:40, color:'#374151', pts:8  },
  { id:'axolotl',  w:68, h:60, color:'#f472b6', pts:12 },
];

// ── Init background elements ───────────────────────────────────────────────
for(let i=0;i<80;i++){
  stars.push({ x:Math.random()*W, y:Math.random()*H*0.85,
    r:Math.random()*1.5+0.3, blink:Math.random()*Math.PI*2, speed:0.5+Math.random()*0.5 });
}
for(let i=0;i<6;i++){
  bgClouds.push({ x:Math.random()*W, y:20+Math.random()*H*0.55,
    w:80+Math.random()*120, h:30+Math.random()*40,
    speed:0.4+Math.random()*0.5, alpha:0.12+Math.random()*0.12 });
}

// ── Particle system ────────────────────────────────────────────────────────
function spawnParticles(x,y,color,count,spread=4){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2, spd=1+Math.random()*spread;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-2,
      life:1, decay:0.025+Math.random()*0.025, r:3+Math.random()*4, color});
  }
}
function spawnStarBurst(x,y){
  const colors=['#FFE44D','#ff6b6b','#4ade80','#60a5fa','#f97316','#e879f9'];
  colors.forEach(c => spawnParticles(x,y,c,5,6));
}

// ── Obstacle spawning ──────────────────────────────────────────────────────
let nextObstacle = 80;
function spawnObstacle(){
  const t = OBS_TYPES[Math.floor(Math.random()*OBS_TYPES.length)];
  const margin = 40;
  const y = margin + Math.random()*(H - margin*2 - t.h);
  // some obstacles move up/down sinusoidally
  const waveAmp = Math.random()<0.5 ? 20+Math.random()*40 : 0;
  const waveFreq = 0.02+Math.random()*0.03;
  obstacles.push({ ...t, x:W+20, y, baseY:y, waveAmp, waveFreq, phase:Math.random()*Math.PI*2, frame:0 });
}

// ── Drawing helpers ────────────────────────────────────────────────────────
function drawBackground(){
  // Sky gradient
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#060624');
  g.addColorStop(0.5,'#0f1a5e');
  g.addColorStop(1,'#1e3a5f');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // Stars
  const t = frame*0.02;
  stars.forEach(s=>{
    const alpha = 0.5 + 0.5*Math.sin(s.blink + t*s.speed);
    ctx.save(); ctx.globalAlpha=alpha;
    ctx.fillStyle='#ffffff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Background clouds (parallax)
  bgClouds.forEach(c=>{
    c.x -= c.speed;
    if(c.x + c.w < 0) c.x = W + c.w;
    ctx.save(); ctx.globalAlpha=c.alpha;
    ctx.fillStyle='#c7d2fe';
    drawCloudShape(c.x,c.y,c.w,c.h);
    ctx.restore();
  });

  // Ground mist / horizon glow
  const hg = ctx.createLinearGradient(0,H*0.75,0,H);
  hg.addColorStop(0,'rgba(99,102,241,0)');
  hg.addColorStop(1,'rgba(99,102,241,0.18)');
  ctx.fillStyle=hg; ctx.fillRect(0,H*0.75,W,H*0.25);
}

function drawCloudShape(x,y,w,h){
  ctx.beginPath();
  ctx.ellipse(x+w*0.5, y+h*0.6, w*0.5, h*0.4, 0, 0, Math.PI*2);
  ctx.ellipse(x+w*0.3, y+h*0.4, w*0.28, h*0.38, 0, 0, Math.PI*2);
  ctx.ellipse(x+w*0.7, y+h*0.45, w*0.25, h*0.35, 0, 0, Math.PI*2);
  ctx.fill();
}

// ── Draw Unicorn ───────────────────────────────────────────────────────────
function drawUnicorn(x, y, t){
  const gallop = Math.sin(t*8)*6;
  const bodyBob = Math.sin(t*8)*3;

  ctx.save(); ctx.translate(x, y + bodyBob);

  // Shadow
  ctx.save(); ctx.globalAlpha=0.15;
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(0,38,40,8,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // TAIL (behind body, drawn first)
  const tailColors = ['#f9a8d4','#c084fc','#818cf8','#67e8f9'];
  tailColors.forEach((c,i)=>{
    ctx.strokeStyle=c; ctx.lineWidth=4-i*0.5; ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(-42, -8+i*3);
    ctx.bezierCurveTo(-60+Math.sin(t*5+i)*8, -20+i*5+gallop*0.5,
                      -68+Math.sin(t*4+i)*10, 5+i*4+gallop,
                      -58+Math.cos(t*6+i)*6, 20+i*5);
    ctx.stroke();
  });

  // BACK LEGS
  drawLeg(ctx, -18, 12, t, true,  gallop, '#f0f0ff');
  drawLeg(ctx,  -6, 12, t, false, gallop, '#e8e8fa');

  // BODY
  ctx.fillStyle='#f8f8ff';
  ctx.beginPath();
  ctx.ellipse(0, 5, 38, 22, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle='#d0d0f0'; ctx.lineWidth=1.5; ctx.stroke();

  // Belly highlight
  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.beginPath(); ctx.ellipse(-5, 8, 20, 10, 0.2, 0, Math.PI*2); ctx.fill();

  // FRONT LEGS
  drawLeg(ctx, 12, 12, t, false, gallop, '#f0f0ff');
  drawLeg(ctx, 24, 12, t, true,  gallop, '#e8e8fa');

  // NECK
  ctx.fillStyle='#f0f0ff';
  ctx.beginPath();
  ctx.moveTo(20,-8); ctx.quadraticCurveTo(38,-22,32,-38);
  ctx.quadraticCurveTo(26,-40,22,-36);
  ctx.quadraticCurveTo(28,-22,14,-8);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#d0d0f0'; ctx.lineWidth=1; ctx.stroke();

  // HEAD
  ctx.fillStyle='#f8f8ff';
  ctx.beginPath(); ctx.ellipse(28,-42,16,13,0.3,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#d0d0f0'; ctx.lineWidth=1; ctx.stroke();

  // SNOUT
  ctx.fillStyle='#ffe4f0';
  ctx.beginPath(); ctx.ellipse(40,-40,9,6,0.1,0,Math.PI*2); ctx.fill();
  // Nostril
  ctx.fillStyle='#ffb3d1';
  ctx.beginPath(); ctx.arc(44,-38,2,0,Math.PI*2); ctx.fill();

  // EYE
  ctx.fillStyle='#1a1a2e';
  ctx.beginPath(); ctx.arc(26,-46,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.arc(24.5,-47.5,1.5,0,Math.PI*2); ctx.fill();
  // Eyelashes
  ctx.strokeStyle='#333'; ctx.lineWidth=1.2;
  [[22,-50],[24,-51],[26,-51.5],[28,-51]].forEach(([ex,ey])=>{
    ctx.beginPath(); ctx.moveTo(ex,ey+2); ctx.lineTo(ex,ey); ctx.stroke();
  });

  // HORN (rainbow!)
  const hornColors=['#FF6B6B','#FFA500','#FFE44D','#4ade80','#60a5fa','#a78bfa'];
  for(let i=0;i<6;i++){
    ctx.fillStyle=hornColors[i];
    ctx.beginPath();
    const base=16-i*2.2, tip=28+i*3.5;
    ctx.moveTo(20-base/2, -50-i*2);
    ctx.lineTo(20+base/2, -50-i*2);
    ctx.lineTo(20, -50-tip);
    ctx.closePath(); ctx.fill();
  }
  // Horn sparkle
  ctx.save(); ctx.globalAlpha=0.8;
  ctx.fillStyle='white';
  const sp = 20 + Math.sin(t*6)*2;
  ctx.beginPath(); ctx.arc(sp,-74+Math.sin(t*5)*4,2,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // MANE (flowing rainbow)
  const maneColors=['#f9a8d4','#c084fc','#818cf8','#60a5fa','#34d399'];
  maneColors.forEach((c,i)=>{
    ctx.strokeStyle=c; ctx.lineWidth=5-i*0.6; ctx.lineCap='round';
    const wave=Math.sin(t*5+i*0.8)*5;
    ctx.beginPath();
    ctx.moveTo(24+i*1.5,-34);
    ctx.bezierCurveTo(10+wave,-28+i*2, 2+wave,-18+i*3, -4+wave*0.5,-8+i*2);
    ctx.stroke();
  });

  // WINGS (fairy-like)
  drawWing(ctx, -5, -8, t, 1);
  drawWing(ctx, -5, -8, t, -1);

  ctx.restore();
}

function drawLeg(ctx, offX, offY, t, phase, gallop, color){
  const swing = (phase ? gallop : -gallop) * 0.6;
  ctx.strokeStyle=color; ctx.lineWidth=7; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(offX, offY);
  ctx.quadraticCurveTo(offX+swing, offY+14, offX+swing*0.5, offY+26);
  ctx.stroke();
  // Hoof
  ctx.fillStyle='#b8b8d8';
  ctx.beginPath(); ctx.ellipse(offX+swing*0.5, offY+28, 5, 3, 0.1, 0, Math.PI*2); ctx.fill();
}

function drawWing(ctx, x, y, t, side){
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(side, 1);
  const flutter = Math.sin(t*6)*0.15;
  ctx.save(); ctx.rotate(-0.3+flutter);
  // Wing membrane
  const wg = ctx.createLinearGradient(0,0,-60,-30);
  wg.addColorStop(0,'rgba(196,181,253,0.7)');
  wg.addColorStop(1,'rgba(196,181,253,0.05)');
  ctx.fillStyle=wg;
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.bezierCurveTo(-20,-30,-50,-35,-65,-15);
  ctx.bezierCurveTo(-45,-5,-20,-2,0,0);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='rgba(167,139,250,0.5)'; ctx.lineWidth=1; ctx.stroke();
  ctx.restore();
  ctx.restore();
}

// ── Draw Acadia on unicorn ─────────────────────────────────────────────────
function drawAcadia(x, y, t){
  const bob = Math.sin(t*8)*3;
  ctx.save(); ctx.translate(x, y + bob - 30); // sit on unicorn back

  // Body – white shirt
  ctx.fillStyle='#f2f2f2';
  ctx.beginPath(); ctx.rect(-11,-6,22,20); ctx.fill();
  ctx.strokeStyle='#d0d0d0'; ctx.lineWidth=0.8; ctx.stroke();
  // Collar
  ctx.strokeStyle='#ccc'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(-5,-6); ctx.lineTo(0,-1); ctx.lineTo(5,-6); ctx.stroke();

  // Plaid skirt
  ctx.fillStyle='#354e38';
  ctx.beginPath(); ctx.moveTo(-13,14); ctx.lineTo(-16,32); ctx.lineTo(16,32); ctx.lineTo(13,14); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='rgba(120,40,40,0.4)'; ctx.lineWidth=1.5;
  for(let i=-10;i<16;i+=7){
    ctx.beginPath(); ctx.moveTo(i-3,14); ctx.lineTo(i-5,32); ctx.stroke();
  }
  ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1;
  for(let j=18;j<32;j+=6){
    ctx.beginPath(); ctx.moveTo(-16,j); ctx.lineTo(16,j); ctx.stroke();
  }

  // Arms out (wind swept)
  ctx.strokeStyle='#f6cfa8'; ctx.lineWidth=6; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-10,2); ctx.lineTo(-22,-8+Math.sin(t*4)*4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(10,2);  ctx.lineTo(22,-10+Math.sin(t*4+1)*4); ctx.stroke();

  // Legs astride unicorn
  ctx.strokeStyle='#f6cfa8'; ctx.lineWidth=7; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-7,32); ctx.lineTo(-14,44); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(7,32);  ctx.lineTo(14,44); ctx.stroke();
  // Shoes
  ctx.fillStyle='#4466EE';
  ctx.beginPath(); ctx.ellipse(-14,46,9,4,0.15,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(14,46,9,4,-0.15,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FF6B35';
  ctx.fillRect(-22,43,8,3); ctx.fillRect(6,43,8,3);

  // NECK
  ctx.fillStyle='#f6cfa8'; ctx.fillRect(-5,-14,10,10);

  // Big red hair (behind face)
  ctx.fillStyle='#c84b14';
  ctx.beginPath(); ctx.ellipse(0,-26,20,18,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-17,-23,9,8,0.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(17,-23,9,8,-0.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-12,-38,9,9,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(12,-38,9,9,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(0,-42,10,10,0,0,Math.PI*2); ctx.fill();
  // Hair highlight
  ctx.fillStyle='rgba(225,88,25,0.45)';
  ctx.beginPath(); ctx.ellipse(-5,-40,6,5,0,0,Math.PI*2); ctx.fill();
  // Hair trails in wind
  ctx.strokeStyle='#c84b14'; ctx.lineWidth=4; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-18,-24); ctx.bezierCurveTo(-30,-20,-40,-16,-50,-20+Math.sin(t*3)*4); ctx.stroke();
  ctx.strokeStyle='#e05515'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(-16,-30); ctx.bezierCurveTo(-28,-28,-38,-22,-46,-28+Math.sin(t*3+1)*4); ctx.stroke();

  // FACE
  ctx.fillStyle='#f6cfa8';
  ctx.beginPath(); ctx.ellipse(0,-24,16,17,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#e0a070'; ctx.lineWidth=0.7; ctx.stroke();

  // Chubby cheeks
  ctx.fillStyle='rgba(255,155,115,0.3)';
  ctx.beginPath(); ctx.ellipse(-13,-23,8,7,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(13,-23,8,7,0,0,Math.PI*2); ctx.fill();

  // Eyebrows
  ctx.strokeStyle='#b04010'; ctx.lineWidth=2.2; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-10,-32); ctx.quadraticCurveTo(-6,-34,-2,-32); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(2,-32);   ctx.quadraticCurveTo(6,-34,10,-32);  ctx.stroke();

  // Big eyes
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.ellipse(-6,-27,5.5,5,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(6,-27,5.5,5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#4a8c30';
  ctx.beginPath(); ctx.arc(-6,-27,3.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(6,-27,3.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.arc(-6,-27,2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(6,-27,2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.arc(-4.8,-28.2,1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(7.2,-28.2,1,0,Math.PI*2); ctx.fill();

  // Nose
  ctx.fillStyle='#e09070';
  ctx.beginPath(); ctx.ellipse(0,-20,3.5,2.5,0,0,Math.PI*2); ctx.fill();

  // Big smile
  ctx.strokeStyle='#b06040'; ctx.lineWidth=1.8; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(0,-16,7,0.15,Math.PI-0.15); ctx.stroke();
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.arc(0,-12,4.5,Math.PI,0); ctx.fill();
  ctx.fillStyle='#e09070'; ctx.fillRect(-1,-12,2,4); // tooth gap

  // Freckles
  ctx.fillStyle='rgba(170,80,40,0.4)';
  [[-10,-21],[-12,-19],[-8,-18],[8,-21],[10,-19],[12,-18],[-3,-18],[3,-18]].forEach(([fx,fy])=>{
    ctx.beginPath(); ctx.arc(fx,fy,1.3,0,Math.PI*2); ctx.fill();
  });

  // Sparkles around hair
  ctx.fillStyle='#FFE44D';
  const sparkles=[[-22,-42,-10],[-24,-32,-8],[-20,-18,-5],[18,-38,-12],[20,-28,-6]];
  sparkles.forEach(([sx,sy,phase])=>{
    const a=(t*3+phase);
    const sx2=sx+Math.cos(a)*3, sy2=sy+Math.sin(a)*3;
    ctx.globalAlpha=0.6+0.4*Math.sin(a);
    ctx.beginPath(); ctx.arc(sx2,sy2,1.5,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;

  ctx.restore();
}

// ── Draw obstacles ─────────────────────────────────────────────────────────
function drawObstacle(o){
  const t = o.frame * 0.05;
  ctx.save(); ctx.translate(o.x + o.w/2, o.y + o.h/2);

  switch(o.id){
    case 'dragon':   drawDragon(ctx, t, o.w, o.h);   break;
    case 'ghost':    drawGhost(ctx, t, o.w, o.h);    break;
    case 'fireball': drawFireball(ctx, t, o.w, o.h); break;
    case 'bat':      drawBat(ctx, t, o.w, o.h);      break;
    case 'skull':    drawSkull(ctx, t, o.w, o.h);    break;
    case 'bomb':     drawBomb(ctx, t, o.w, o.h);     break;
    case 'axolotl':  drawAxolotl(ctx, t, o.w, o.h);  break;
  }
  ctx.restore();
}

function drawDragon(ctx, t, w, h){
  const sc=w/70;
  ctx.scale(sc,sc);
  // Body
  ctx.fillStyle='#dc2626';
  ctx.beginPath(); ctx.ellipse(0,0,28,18,0,0,Math.PI*2); ctx.fill();
  // Head
  ctx.fillStyle='#ef4444';
  ctx.beginPath(); ctx.ellipse(-28,0,16,12,-0.2,0,Math.PI*2); ctx.fill();
  // Snout
  ctx.fillStyle='#fca5a5';
  ctx.beginPath(); ctx.ellipse(-40,2,8,6,0,0,Math.PI*2); ctx.fill();
  // Eye
  ctx.fillStyle='#fbbf24';
  ctx.beginPath(); ctx.arc(-26,-5,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(-26,-5,2,0,Math.PI*2); ctx.fill();
  // Fire breath
  const fw = Math.sin(t*8)*5;
  ['#fbbf24','#f97316','#ef4444'].forEach((c,i)=>{
    ctx.fillStyle=c; ctx.globalAlpha=0.8-i*0.2;
    ctx.beginPath(); ctx.ellipse(-52-i*8+fw,-2+fw*0.3, 10+i*4,5+i*3,-0.1,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
  // Wings
  const wf=Math.sin(t*6)*0.3;
  ctx.fillStyle='#b91c1c';
  ctx.save(); ctx.rotate(-wf);
  ctx.beginPath(); ctx.moveTo(0,-18); ctx.bezierCurveTo(15,-45,40,-40,35,-20); ctx.bezierCurveTo(20,-15,5,-12,0,-18); ctx.closePath(); ctx.fill();
  ctx.restore();
  ctx.save(); ctx.rotate(wf);
  ctx.beginPath(); ctx.moveTo(0,18); ctx.bezierCurveTo(15,45,40,40,35,20); ctx.bezierCurveTo(20,15,5,12,0,18); ctx.closePath(); ctx.fill();
  ctx.restore();
  // Tail
  ctx.strokeStyle='#dc2626'; ctx.lineWidth=6; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(26,0); ctx.bezierCurveTo(40,8+Math.sin(t*5)*5,50,15,45,25); ctx.stroke();
  // Spikes
  ctx.fillStyle='#7f1d1d';
  for(let i=0;i<4;i++){
    ctx.beginPath(); ctx.moveTo(-10+i*12,-18); ctx.lineTo(-6+i*12,-28); ctx.lineTo(-2+i*12,-18); ctx.closePath(); ctx.fill();
  }
}

function drawGhost(ctx, t, w, h){
  const sc=w/50, bob=Math.sin(t*4)*4;
  ctx.scale(sc,sc);
  ctx.save(); ctx.translate(0,bob);
  // Glow
  ctx.save(); ctx.globalAlpha=0.25;
  const gg=ctx.createRadialGradient(0,0,5,0,0,35);
  gg.addColorStop(0,'#a78bfa'); gg.addColorStop(1,'transparent');
  ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(0,0,35,0,Math.PI*2); ctx.fill();
  ctx.restore();
  // Body
  ctx.fillStyle='rgba(196,181,253,0.85)';
  ctx.beginPath();
  ctx.arc(0,-8,22,Math.PI,0);
  ctx.lineTo(22,18);
  for(let i=0;i<5;i++){
    const wx=22-i*11, wy=18;
    ctx.bezierCurveTo(wx-3,wy+10,wx-8,wy+10,wx-11,wy);
  }
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='rgba(167,139,250,0.6)'; ctx.lineWidth=1.5; ctx.stroke();
  // Eyes
  ctx.fillStyle='#4c1d95';
  ctx.beginPath(); ctx.ellipse(-8,-10,5,6,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(8,-10,5,6,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.arc(-6.5,-11.5,1.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(9.5,-11.5,1.5,0,Math.PI*2); ctx.fill();
  // Mouth
  ctx.strokeStyle='#4c1d95'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(0,-2,7,0.3,Math.PI-0.3); ctx.stroke();
  ctx.restore();
}

function drawFireball(ctx, t, w, h){
  const sc=w/36, pulse=1+Math.sin(t*10)*0.08;
  ctx.scale(sc*pulse, sc*pulse);
  // Outer glow
  const fg=ctx.createRadialGradient(0,0,2,0,0,20);
  fg.addColorStop(0,'#fef08a'); fg.addColorStop(0.5,'#f97316'); fg.addColorStop(1,'rgba(239,68,68,0)');
  ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(0,0,20,0,Math.PI*2); ctx.fill();
  // Core
  ctx.fillStyle='#fef08a';
  ctx.beginPath(); ctx.arc(0,0,8,0,Math.PI*2); ctx.fill();
  // Flame tendrils
  const flames=['#fbbf24','#f97316','#ef4444'];
  flames.forEach((c,i)=>{
    ctx.fillStyle=c; ctx.globalAlpha=0.7;
    const a=t*4+i*2.1;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.bezierCurveTo(Math.cos(a)*12,Math.sin(a)*12,Math.cos(a+0.5)*16,Math.sin(a+0.5)*16,Math.cos(a+1)*9,Math.sin(a+1)*9);
    ctx.closePath(); ctx.fill();
  });
  ctx.globalAlpha=1;
  // Sparks
  ctx.fillStyle='#fef08a';
  for(let i=0;i<5;i++){
    const a=t*3+i*1.26, r=12+Math.sin(t*5+i)*3;
    ctx.globalAlpha=0.6;
    ctx.beginPath(); ctx.arc(Math.cos(a)*r,Math.sin(a)*r,1.5,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawBat(ctx, t, w, h){
  const sc=w/55, wf=Math.sin(t*8)*0.5;
  ctx.scale(sc,sc);
  // Wings
  ctx.fillStyle='#1e293b';
  ctx.save(); ctx.rotate(wf);
  ctx.beginPath(); ctx.moveTo(0,0); ctx.bezierCurveTo(-15,-20,-35,-22,-38,-8); ctx.bezierCurveTo(-30,-2,-15,2,0,0); ctx.closePath();
  // Wing membrane veins
  ctx.fill();
  ctx.strokeStyle='#334155'; ctx.lineWidth=0.8;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-25,-14); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-20,-20); ctx.stroke();
  ctx.restore();
  ctx.save(); ctx.scale(-1,1); ctx.rotate(wf);
  ctx.beginPath(); ctx.moveTo(0,0); ctx.bezierCurveTo(-15,-20,-35,-22,-38,-8); ctx.bezierCurveTo(-30,-2,-15,2,0,0); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-25,-14); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-20,-20); ctx.stroke();
  ctx.restore();
  // Body
  ctx.fillStyle='#374151';
  ctx.beginPath(); ctx.ellipse(0,0,12,9,0,0,Math.PI*2); ctx.fill();
  // Ears
  ctx.fillStyle='#1e293b';
  ctx.beginPath(); ctx.moveTo(-6,-9); ctx.lineTo(-10,-20); ctx.lineTo(-2,-10); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(6,-9); ctx.lineTo(10,-20); ctx.lineTo(2,-10); ctx.closePath(); ctx.fill();
  // Eyes
  ctx.fillStyle='#ef4444';
  ctx.beginPath(); ctx.arc(-4,-2,3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(4,-2,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.arc(-4,-2,1.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(4,-2,1.5,0,Math.PI*2); ctx.fill();
  // Fangs
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.moveTo(-3,7); ctx.lineTo(-1,7); ctx.lineTo(-2,12); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(1,7); ctx.lineTo(3,7); ctx.lineTo(2,12); ctx.closePath(); ctx.fill();
}

function drawSkull(ctx, t, w, h){
  const sc=w/40, bob=Math.sin(t*3)*3;
  ctx.scale(sc,sc);
  ctx.save(); ctx.translate(0,bob);
  // Glow
  ctx.save(); ctx.globalAlpha=0.2;
  ctx.fillStyle='#22c55e';
  ctx.beginPath(); ctx.arc(0,-5,28,0,Math.PI*2); ctx.fill();
  ctx.restore();
  // Skull
  ctx.fillStyle='#e2e8f0';
  ctx.beginPath(); ctx.arc(0,-10,18,Math.PI,0); ctx.fill();
  ctx.beginPath(); ctx.rect(-18,-10,36,16); ctx.fill();
  // Jaw
  ctx.fillStyle='#cbd5e1';
  ctx.beginPath(); ctx.rect(-14,6,28,10); ctx.fill();
  // Teeth
  ctx.fillStyle='white';
  [-10,-3,3,10].forEach(tx=>{
    ctx.fillRect(tx,6,5,8);
  });
  ctx.fillStyle='#94a3b8';
  [-10,-3,3,10].forEach(tx=>{
    ctx.fillRect(tx+1,6,1,8);
  });
  // Eye sockets
  ctx.fillStyle='#22c55e';
  ctx.beginPath(); ctx.ellipse(-7,-12,7,8,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(7,-12,7,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.beginPath(); ctx.ellipse(-7,-12,5,6,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(7,-12,5,6,0,0,Math.PI*2); ctx.fill();
  // Nose
  ctx.fillStyle='#22c55e';
  ctx.beginPath(); ctx.moveTo(0,-4); ctx.lineTo(-3,2); ctx.lineTo(3,2); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawBomb(ctx, t, w, h){
  const sc=w/38;
  ctx.scale(sc,sc);
  // Fuse spark
  const sp=Math.sin(t*12)*3;
  ctx.strokeStyle='#fbbf24'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(4,-16); ctx.bezierCurveTo(8,-22+sp,12,-18,10,-12); ctx.stroke();
  ctx.fillStyle='#fef08a'; ctx.globalAlpha=0.8+Math.sin(t*15)*0.2;
  ctx.beginPath(); ctx.arc(10,-12,3+Math.sin(t*15)*1.5,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
  // Bomb body
  ctx.fillStyle='#111827';
  ctx.beginPath(); ctx.arc(0,0,17,0,Math.PI*2); ctx.fill();
  // Shine
  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.beginPath(); ctx.ellipse(-5,-6,8,5,-0.4,0,Math.PI*2); ctx.fill();
  // Danger stripes
  ctx.strokeStyle='#ef4444'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(0,0,10,0.4,Math.PI-0.4); ctx.stroke();
  // Skull on bomb
  ctx.fillStyle='#374151';
  ctx.beginPath(); ctx.arc(0,0,6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white';
  ctx.font='bold 8px sans-serif'; ctx.textAlign='center';
  ctx.fillText('!',0,3);
}

function drawAxolotl(ctx, t, w, h){
  const sc = w/68;
  ctx.scale(sc, sc);

  // Tail — wiggles side to side
  const tailWag = Math.sin(t*6)*10;
  ctx.strokeStyle='#f9a8d4'; ctx.lineWidth=10; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(28, 5);
  ctx.bezierCurveTo(45, 5+tailWag, 58, 0+tailWag*0.5, 62, -8+tailWag);
  ctx.stroke();
  // Tail fin frills
  ctx.strokeStyle='#fb7185'; ctx.lineWidth=3;
  [0.3,0.6,0.85].forEach(p=>{
    const tx = 28 + p*(62-28), ty = 5 + p*((-8+tailWag)-5);
    ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(tx+Math.sin(t*5+p*3)*6, ty-10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(tx+Math.sin(t*5+p*3+1)*5, ty+8); ctx.stroke();
  });

  // Back legs
  ctx.strokeStyle='#f9a8d4'; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(14,16); ctx.lineTo(18+Math.sin(t*5)*4, 30); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(22,18); ctx.lineTo(26+Math.sin(t*5)*4, 32); ctx.stroke();
  // Back feet
  ctx.fillStyle='#fb7185';
  [[18+Math.sin(t*5)*4,30],[26+Math.sin(t*5)*4,32]].forEach(([fx,fy])=>{
    ctx.beginPath(); ctx.ellipse(fx,fy,5,3,0.2,0,Math.PI*2); ctx.fill();
  });

  // BODY — pink/salmon, chubby salamander shape
  const bodyGrad = ctx.createRadialGradient(-5, -5, 2, -5, -5, 30);
  bodyGrad.addColorStop(0, '#fce7f3');
  bodyGrad.addColorStop(1, '#f472b6');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.ellipse(0, 5, 28, 18, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle='#ec4899'; ctx.lineWidth=1.5; ctx.stroke();

  // Belly spots (evil markings)
  ctx.fillStyle='rgba(190,24,93,0.3)';
  [[-8,8],[-1,12],[9,7],[3,3]].forEach(([sx,sy])=>{
    ctx.beginPath(); ctx.arc(sx,sy,4,0,Math.PI*2); ctx.fill();
  });

  // Front legs
  ctx.strokeStyle='#f9a8d4'; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-18,8); ctx.lineTo(-22+Math.sin(t*5+1)*4, 22); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-10,12); ctx.lineTo(-14+Math.sin(t*5+1)*4, 26); ctx.stroke();
  ctx.fillStyle='#fb7185';
  [[-22+Math.sin(t*5+1)*4,22],[-14+Math.sin(t*5+1)*4,26]].forEach(([fx,fy])=>{
    ctx.beginPath(); ctx.ellipse(fx,fy,5,3,-0.2,0,Math.PI*2); ctx.fill();
  });

  // HEAD — big round evil head
  ctx.fillStyle='#fce7f3';
  ctx.beginPath(); ctx.ellipse(-18, -2, 20, 16, -0.1, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle='#ec4899'; ctx.lineWidth=1.5; ctx.stroke();

  // EXTERNAL GILLS — axolotl's signature feathery gills, now glowing red/evil
  const gillColors = ['#ef4444','#dc2626','#b91c1c'];
  [-28,-22,-16].forEach((gx, gi)=>{
    const sway = Math.sin(t*4 + gi*0.8)*5;
    ctx.strokeStyle=gillColors[gi]; ctx.lineWidth=2.5; ctx.lineCap='round';
    // Main stalk
    ctx.beginPath(); ctx.moveTo(gx, -10); ctx.lineTo(gx+sway, -26); ctx.stroke();
    // Feather branches
    ctx.lineWidth=1.5;
    [0.3,0.6,0.9].forEach(p=>{
      const bx = gx + sway*p, by = -10 - p*16;
      ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(bx-5,by-5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(bx+4,by-4); ctx.stroke();
    });
    // Glow tip
    ctx.fillStyle='#fca5a5'; ctx.globalAlpha=0.9;
    ctx.beginPath(); ctx.arc(gx+sway,-26,2.5,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  });

  // EYES — wide evil glowing red eyes
  // Eye whites
  ctx.fillStyle='#fff0f0';
  ctx.beginPath(); ctx.ellipse(-25, -5, 8, 7, -0.15, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-11, -4, 8, 7, 0.15, 0, Math.PI*2); ctx.fill();
  // Irises — evil red
  ctx.fillStyle='#ef4444';
  ctx.beginPath(); ctx.arc(-25,-5,5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(-11,-4,5,0,Math.PI*2); ctx.fill();
  // Pupils — slit pupils for extra evil
  ctx.fillStyle='#1a0000';
  ctx.beginPath(); ctx.ellipse(-25,-5,2,4.5,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-11,-4,2,4.5,0,0,Math.PI*2); ctx.fill();
  // Eye shine
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.arc(-23,-7,1.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(-9,-6,1.5,0,Math.PI*2); ctx.fill();
  // Evil glow around eyes
  ctx.save(); ctx.globalAlpha=0.2+0.15*Math.sin(t*4);
  const eg1=ctx.createRadialGradient(-25,-5,2,-25,-5,10);
  eg1.addColorStop(0,'#ef4444'); eg1.addColorStop(1,'transparent');
  ctx.fillStyle=eg1; ctx.beginPath(); ctx.arc(-25,-5,10,0,Math.PI*2); ctx.fill();
  const eg2=ctx.createRadialGradient(-11,-4,2,-11,-4,10);
  eg2.addColorStop(0,'#ef4444'); eg2.addColorStop(1,'transparent');
  ctx.fillStyle=eg2; ctx.beginPath(); ctx.arc(-11,-4,10,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // WIDE EVIL GRIN — lots of little sharp teeth
  ctx.strokeStyle='#9d174d'; ctx.lineWidth=1.8; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(-18, 2, 11, 0.2, Math.PI-0.2); ctx.stroke();
  // Sharp teeth along smile
  ctx.fillStyle='#fff0f0';
  for(let i=0;i<6;i++){
    const ta = 0.3 + i*(Math.PI-0.6)/5;
    const tx2 = -18 + Math.cos(ta)*11;
    const ty2 = 2  + Math.sin(ta)*11;
    ctx.beginPath();
    ctx.moveTo(tx2-2, ty2-2);
    ctx.lineTo(tx2,   ty2+4);
    ctx.lineTo(tx2+2, ty2-2);
    ctx.closePath(); ctx.fill();
  }

  // NOSTRILS
  ctx.fillStyle='#db2777';
  ctx.beginPath(); ctx.arc(-21, -1, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(-15, -1, 1.5, 0, Math.PI*2); ctx.fill();

  // Evil purple/dark aura around whole body
  ctx.save(); ctx.globalAlpha=0.12+0.08*Math.sin(t*3);
  const aura=ctx.createRadialGradient(0,0,15,0,0,42);
  aura.addColorStop(0,'transparent');
  aura.addColorStop(0.7,'#9d174d');
  aura.addColorStop(1,'transparent');
  ctx.fillStyle=aura; ctx.beginPath(); ctx.arc(0,0,42,0,Math.PI*2); ctx.fill();
  ctx.restore();
}
function drawHUD(){
  // Score
  ctx.fillStyle='rgba(0,0,0,0.45)';
  ctx.beginPath(); ctx.rect(8,8,160,38); ctx.fill();
  ctx.strokeStyle='rgba(167,139,250,0.6)'; ctx.lineWidth=1.5; ctx.stroke();

  ctx.font='bold 11px "Nunito",sans-serif'; ctx.textAlign='left';
  ctx.fillStyle='#c4b5fd'; ctx.fillText('SCORE', 18, 24);
  ctx.font='bold 22px "Fredoka One",cursive';
  ctx.fillStyle='#FFE44D'; ctx.fillText(score, 18, 42);

  // Best
  ctx.font='bold 11px "Nunito",sans-serif'; ctx.fillStyle='#c4b5fd'; ctx.fillText('BEST', 100, 24);
  ctx.font='bold 18px "Fredoka One",cursive'; ctx.fillStyle='#a78bfa'; ctx.fillText(bestScore, 100, 42);

  // Lives
  ctx.textAlign='right';
  ctx.font='bold 11px "Nunito",sans-serif'; ctx.fillStyle='#c4b5fd'; ctx.fillText('LIVES', W-12, 24);
  for(let i=0;i<3;i++){
    ctx.fillStyle = i < lives ? '#ef4444' : 'rgba(100,100,120,0.4)';
    ctx.font='20px serif'; ctx.textAlign='right';
    ctx.fillText('\u2764', W-12-i*26, 44);
  }

  // Speed indicator
  const spd = Math.min(1,(speed-3.5)/6);
  ctx.textAlign='center';
  ctx.font='bold 10px "Nunito",sans-serif'; ctx.fillStyle='rgba(196,181,253,0.5)';
  ctx.fillText('SPEED: '+'▶'.repeat(Math.ceil(spd*5+1)), W/2, 16);
}

// ── Hit flash overlay ──────────────────────────────────────────────────────
function drawHitFlash(){
  if(hitAnim<=0) return;
  ctx.save(); ctx.globalAlpha=hitAnim/30*0.5;
  ctx.fillStyle='#ef4444'; ctx.fillRect(0,0,W,H);
  ctx.restore();
  hitAnim--;
}

// ── Score popup ────────────────────────────────────────────────────────────
let scorePopups=[];
function addScorePopup(x,y,pts){
  scorePopups.push({x,y,life:1,pts,vy:-1.5});
}
function drawScorePopups(){
  scorePopups=scorePopups.filter(p=>p.life>0);
  scorePopups.forEach(p=>{
    p.y+=p.vy; p.life-=0.022;
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.font='bold 16px "Fredoka One",cursive'; ctx.textAlign='center';
    ctx.fillStyle='#FFE44D'; ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=3;
    ctx.strokeText('+'+p.pts,p.x,p.y); ctx.fillText('+'+p.pts,p.x,p.y);
    ctx.restore();
  });
}

// ── Death animation ────────────────────────────────────────────────────────
let deathX=0, deathY=0, deathRot=0, deathVY=0;
function startDeath(){
  dying=true; deathAnim=60;
  deathX=playerX; deathY=playerY;
  deathRot=0; deathVY=-8;
  spawnStarBurst(playerX,playerY);
  spawnParticles(playerX,playerY,'#ef4444',20,8);
}

function updateDeath(){
  if(!dying) return;
  deathAnim--;
  deathVY+=0.5;
  deathY+=deathVY;
  deathRot+=0.18;
  const t=frame*0.016;
  ctx.save();
  ctx.translate(deathX,deathY);
  ctx.rotate(deathRot);
  ctx.globalAlpha=Math.max(0,deathAnim/60);
  // Draw dying unicorn+rider spinning off
  drawUnicorn(-50,0,t);
  drawAcadia(-50,0,t);
  ctx.restore();
  if(deathAnim<=0){
    dying=false;
    if(lives<=0){
      endGame();
    } else {
      // Respawn
      playerY=H/2; playerX=130; playerVY=0; playerVX=0;
      invincible=120;
      obstacles=[];
    }
  }
}

// ── Main game update ───────────────────────────────────────────────────────
function update(){
  if(!gameActive || dying) return;
  frame++;

  // Score ticks up with time
  if(frame%6===0){
    score++;
    if(score>bestScore) bestScore=score;
  }

  // Speed ramps up gradually — faster base
  speed = 5.5 + Math.pow(score/600, 0.8) * 5;

  // Player movement — all 4 directions
  const UP=isUp(), DOWN=isDown(), LEFT=isLeft(), RIGHT=isRight();
  if(UP)    playerVY = Math.max(playerVY-1.2, -9);
  if(DOWN)  playerVY = Math.min(playerVY+1.2,  9);
  if(LEFT)  playerVX = Math.max(playerVX-1.0, -7);
  if(RIGHT) playerVX = Math.min(playerVX+1.0,  7);
  if(!UP && !DOWN)  playerVY *= 0.85;
  if(!LEFT && !RIGHT) playerVX *= 0.85;

  playerY += playerVY;
  playerX += playerVX;
  // Keep player in left half of screen so obstacles still come from right
  playerY = Math.max(40, Math.min(H-60, playerY));
  playerX = Math.max(50, Math.min(W*0.55, playerX));

  // Spawn obstacles — tighter gap, more frequent
  nextObstacle--;
  if(nextObstacle<=0){
    spawnObstacle();
    // Sometimes spawn 2 or 3 at once at different heights
    if(Math.random()<0.35) spawnObstacle();
    if(Math.random()<0.15) spawnObstacle();
    nextObstacle = Math.max(35, 90 - score/12);
  }

  // Update obstacles
  obstacles.forEach(o=>{
    o.frame++;
    o.x -= speed;
    if(o.waveAmp>0) o.y = o.baseY + Math.sin(o.phase + o.frame*o.waveFreq)*o.waveAmp;

    // Collision — tight hitbox
    if(invincible<=0 && !dying){
      const px=playerX, py=playerY;
      const hitW=o.w*0.55, hitH=o.h*0.55;
      const ox=o.x+o.w*0.225, oy=o.y+o.h*0.225;
      if(px+28>ox && px-28<ox+hitW && py+20>oy && py-35<oy+hitH){
        hitAnim=30;
        spawnParticles(px,py,'#ef4444',15,5);
        spawnParticles(px,py,'#FFE44D',10,4);
        lives--;
        startDeath();
        return;
      }
    }

    // Score bonus for dodging close call
    if(!o.scored && o.x+o.w < 110 && o.x+o.w > 95){
      o.scored=true;
    }
    // Remove far-left obstacles
  });
  obstacles=obstacles.filter(o=>o.x>-120);

  if(invincible>0) invincible--;
}

// ── Main draw ─────────────────────────────────────────────────────────────
function draw(){
  drawBackground();

  // Draw obstacles (behind player)
  obstacles.forEach(o=>{ if(o.x>130) drawObstacle(o); });

  // Draw player (unicorn + Acadia)
  if(!dying){
    const t=frame*0.016;
    // Invincibility: show a gentle ghost effect (lower alpha) instead of blinking
    const alpha = (invincible>0) ? 0.45 + 0.55*Math.abs(Math.sin(frame*0.15)) : 1.0;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(playerX, playerY);
    drawUnicorn(-50, 0, t);
    drawAcadia(-50, 0, t);
    ctx.restore();
  }

  // Draw obstacles in front of player
  obstacles.forEach(o=>{ if(o.x<=130) drawObstacle(o); });

  // Particles
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.life-=p.decay;
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color; ctx.beginPath();
    ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Death animation
  updateDeath();

  drawHUD();
  drawHitFlash();
  drawScorePopups();

  // Invincibility countdown bar
  if(invincible>0 && !dying){
    const pct=invincible/120;
    ctx.fillStyle='rgba(0,0,0,0.4)';
    ctx.fillRect(W/2-60,H-16,120,8);
    ctx.fillStyle=`hsl(${pct*120},90%,55%)`;
    ctx.fillRect(W/2-60,H-16,120*pct,8);
    ctx.font='bold 9px sans-serif'; ctx.fillStyle='white'; ctx.textAlign='center';
    ctx.fillText('SHIELD',W/2,H-10);
  }
}

// ── Game loop ─────────────────────────────────────────────────────────────
function gameLoop(){
  try {
    update();
    draw();
  } catch(e){
    console.error('Game loop error:',e);
  }
  requestAnimationFrame(gameLoop);
}

// ── Start / End ────────────────────────────────────────────────────────────
function startGame(){
  score=0; lives=3; frame=0; speed=5.5;
  playerY=H/2; playerX=130; playerVY=0; playerVX=0;
  invincible=60; hitAnim=0;
  dying=false; deathAnim=0;
  particles=[]; obstacles=[]; scorePopups=[];
  nextObstacle=80;
  gameActive=true;
  document.getElementById('overlay').style.display='none';
  document.getElementById('ovScore').style.display='none';
}

function endGame(){
  gameActive=false;
  if(score>bestScore) bestScore=score;
  const ov=document.getElementById('overlay');
  document.getElementById('ovTitle').textContent='Game Over! \uD83D\uDC94';
  document.getElementById('ovSub').textContent='The sky beasts got you!';
  document.getElementById('ovSub2').textContent='Better luck next ride!';
  const fs=document.getElementById('ovScore');
  fs.textContent='\u2B50 '+score+' points!';
  fs.style.display='block';
  document.getElementById('startBtn').textContent='RIDE AGAIN! \uD83E\uDD84';
  ov.style.display='flex';
}

document.getElementById('startBtn').addEventListener('click',startGame);
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
